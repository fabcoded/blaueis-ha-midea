<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>blaueis-air-direction card — iteration 3 test harness</title>
<style>
  body {
    font-family: -apple-system, system-ui, sans-serif;
    background: #1c1c1e;
    color: #fff;
    margin: 0;
    padding: 2rem 1rem;
    max-width: 42rem;
    margin-left: auto;
    margin-right: auto;
  }
  h1 { font-size: 1rem; font-weight: 500; opacity: 0.6; margin-bottom: 1rem; }
  .mock-panel {
    background: #2c2c2e;
    border-radius: 10px;
    padding: 1rem;
    margin-top: 1.5rem;
    font-size: 0.8rem;
  }
  .mock-panel h3 { font-size: 0.75rem; opacity: 0.6; margin: 0 0 0.5rem; text-transform: uppercase; letter-spacing: 0.05em; }
  .mock-controls { display: flex; flex-wrap: wrap; gap: 0.5rem; }
  .mock-controls button {
    background: #3a3a3c;
    color: #fff;
    border: none;
    padding: 0.4rem 0.7rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.75rem;
  }
  .mock-controls button:hover { background: #48484a; }
  .mock-controls button.active {
    background: #ff9f0a;
    color: #1c1c1e;
  }
  pre.log {
    background: #000;
    color: #30d158;
    padding: 0.75rem;
    border-radius: 6px;
    font-size: 0.7rem;
    margin-top: 0.5rem;
    max-height: 10rem;
    overflow-y: auto;
    font-family: ui-monospace, monospace;
    white-space: pre-wrap;
  }
  .mock-state {
    font-family: ui-monospace, monospace;
    font-size: 0.72rem;
    opacity: 0.7;
    margin-top: 0.5rem;
    line-height: 1.4;
  }
</style>
</head>
<body>
<h1>blaueis-air-direction card — iteration 3 (standalone test harness)</h1>

<div id="card-host"></div>

<div class="mock-panel">
  <h3>Mocked HA state</h3>
  <div class="mock-state" id="mock-state"></div>

  <h3 style="margin-top: 1rem;">Controls</h3>
  <div class="mock-controls">
    <button id="sim-lr">Simulate LR move</button>
    <button id="sim-ud">Simulate UD move</button>
    <button id="jump">Jump actuals</button>
    <button id="toggle-swing-h">Swing H</button>
    <button id="toggle-swing-v">Swing V</button>
    <button id="toggle-off">AC off</button>
  </div>

  <h3 style="margin-top: 1rem;">callService log</h3>
  <pre class="log" id="log"></pre>
</div>

<script type="module">
// Import the real card file — same code that will ship to HA.
import './blaueis-ac-card.js';

// ── Mocked hass object ───────────────────────────────────────────────
const mockHass = {
  states: {
    'select.lr_target':  { state: '50',    attributes: { options: ['1','25','50','75','100'] } },
    'select.ud_target':  { state: '75',    attributes: { options: ['1','25','50','75','100'] } },
    'sensor.lr_actual':  { state: '50',    attributes: { unit_of_measurement: '%' } },
    'sensor.ud_actual':  { state: '75',    attributes: { unit_of_measurement: '%' } },
    'select.swing_h':    { state: 'False', attributes: { options: ['False','True'] } },
    'select.swing_v':    { state: 'False', attributes: { options: ['False','True'] } },
    'climate.atelier':   { state: 'cool'  },
  },
  callService(domain, service, data) {
    logEntry(`${domain}.${service}  ${JSON.stringify(data)}`);
    if (domain === 'select' && service === 'select_option') {
      mockHass.states[data.entity_id].state = data.option;
      rerender();
    }
  },
};

const card = document.createElement('blaueis-air-direction');
card.setConfig({
  title: 'Air direction (test)',
  lr_target: 'select.lr_target',
  ud_target: 'select.ud_target',
  lr_actual: 'sensor.lr_actual',
  ud_actual: 'sensor.ud_actual',
  swing_h:   'select.swing_h',
  swing_v:   'select.swing_v',
  climate:   'climate.atelier',
});
document.getElementById('card-host').appendChild(card);

function rerender() {
  // Shallow-copy to trigger a property-change on the card.
  card.hass = { ...mockHass, states: { ...mockHass.states } };
  showMockState();
}
rerender();

// ── Mock state readout ───────────────────────────────────────────────
function showMockState() {
  const s = mockHass.states;
  document.getElementById('mock-state').textContent = [
    `select.lr_target = ${s['select.lr_target'].state}     sensor.lr_actual = ${s['sensor.lr_actual'].state}`,
    `select.ud_target = ${s['select.ud_target'].state}     sensor.ud_actual = ${s['sensor.ud_actual'].state}`,
    `swing_h = ${s['select.swing_h'].state}     swing_v = ${s['select.swing_v'].state}`,
    `climate.atelier.state = ${s['climate.atelier'].state}`,
  ].join('\n');
}

// ── Log ──────────────────────────────────────────────────────────────
function logEntry(line) {
  const el = document.getElementById('log');
  const ts = new Date().toISOString().slice(11, 19);
  el.textContent = `${ts}  ${line}\n` + el.textContent;
}

// ── Simulated animations (AC responding to target) ───────────────────
function animateActual(sensorId, targetId) {
  const step = () => {
    const target = parseFloat(mockHass.states[targetId].state);
    const actual = parseFloat(mockHass.states[sensorId].state);
    const diff = target - actual;
    if (Math.abs(diff) < 0.3) {
      mockHass.states[sensorId].state = String(target);
      rerender();
      return;
    }
    const speed = Math.max(0.8, Math.abs(diff) * 0.08);
    mockHass.states[sensorId].state = String(actual + Math.sign(diff) * speed);
    rerender();
    requestAnimationFrame(step);
  };
  step();
}

document.getElementById('sim-lr').addEventListener('click',
  () => animateActual('sensor.lr_actual', 'select.lr_target'));
document.getElementById('sim-ud').addEventListener('click',
  () => animateActual('sensor.ud_actual', 'select.ud_target'));

document.getElementById('jump').addEventListener('click', () => {
  const opts = [1, 25, 50, 75, 100];
  mockHass.states['sensor.lr_actual'].state = String(opts[Math.floor(Math.random() * opts.length)]);
  mockHass.states['sensor.ud_actual'].state = String(opts[Math.floor(Math.random() * opts.length)]);
  rerender();
});

function toggle(btn, entityId, onValue, offValue) {
  return () => {
    const cur = mockHass.states[entityId].state;
    const next = cur === onValue ? offValue : onValue;
    mockHass.states[entityId].state = next;
    btn.classList.toggle('active', next === onValue);
    rerender();
  };
}

document.getElementById('toggle-swing-h').addEventListener('click',
  toggle(document.getElementById('toggle-swing-h'), 'select.swing_h', 'True', 'False'));
document.getElementById('toggle-swing-v').addEventListener('click',
  toggle(document.getElementById('toggle-swing-v'), 'select.swing_v', 'True', 'False'));
document.getElementById('toggle-off').addEventListener('click',
  toggle(document.getElementById('toggle-off'), 'climate.atelier', 'off', 'cool'));
</script>
</body>
</html>
