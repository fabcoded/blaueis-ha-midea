run_field_inventory:
  name: Run field inventory scan
  description: >-
    Inject a superset of read-query frames, capture replies, and produce a
    markdown report of which fields populated. Auto-diffs against the prior
    snapshot for the same entry, if any.
  fields:
    label:
      name: Label
      description: Short state tag for the report header (e.g. "cooling-20C-from-22").
      required: true
      example: "cooling-20C-from-22"
      selector:
        text:
    suggest_overrides:
      name: Suggest glossary overrides
      description: >-
        Append YAML override snippets to the report for fields cap-gated to "never"
        but observed populated.
      default: true
      selector:
        boolean:
    reset_prior:
      name: Reset prior snapshot
      description: >-
        Ignore any existing snapshot — produces a baseline report with no diff
        section. Use after firmware changes invalidate the baseline.
      default: false
      selector:
        boolean:

test_suppress:
  name: Test suppression (debug)
  description: >-
    Drop every incoming AC frame for the given duration so staleness
    rules can be verified on a live device without disconnecting it.
    Auto-clears when the timer expires; pass duration=0 to clear early.
    Capped at 600 s. Logs a WARNING on each activation.
  fields:
    duration:
      name: Duration (seconds)
      description: >-
        How long to suppress incoming frames. 0 clears immediately;
        values above 600 are clamped.
      required: true
      default: 60
      example: 60
      selector:
        number:
          min: 0
          max: 600
          step: 1
          unit_of_measurement: s
          mode: slider
