# XtremeSaveBlue — full profile (v1)
#
# Format: Glossary-Override YAML for the Home Assistant integration.
#         NOT the CLI quirks-loader format (compare with
#         xtremesaveblue_power_quirk.yaml — that one feeds ac_monitor.py
#         and build_command.py via the --quirks flag).
#
# Audience: enthusiasts who want the same setup we run on the dev unit.
# Copy the YAML below into the "Glossary Overrides" textarea in the
# integration's Configure dialog (Settings → Integrations →
# blaueis_midea → Configure → Advanced).
#
# What it does:
#   1. Soft-promotes a small set of diagnostic sensors from
#      `feature_available: readable-opt` (registered + disabled by
#      default in HA's entity registry) to `readable` (registered +
#      enabled). Same end result as clicking "enable" once per entity
#      in HA's Devices & Services UI, but baked into a profile so a
#      pasted YAML covers all of them at once. Defaults stay
#      conservative in the upstream glossary for users who don't want
#      every wire-level signal cluttering their device card.
#   2. Corrects power-metering capability + encoding for this unit:
#      the stock cap probe doesn't reliably mark realtime/total power
#      as available, and the correct linear encoding for this hardware
#      revision is forced explicitly.
#
# Versioning: bump the trailing _v1 → _v2 if the profile shape ever
# changes in a way that breaks copy-paste compatibility (e.g. a field
# rename, a removed override, an encoding change requiring a clean
# re-add). Additions within v1 do not require a version bump.
#
# Confirmed on:
#   - Atelier Midea (XtremeSaveBlue, fingerprint TBD)
#
# ─── Copy from here ─────────────────────────────────────────────────
fields:
  sensor:
    # Inverter DC bus voltage rails — diagnostic only. Useful for
    # spotting brownouts (min sags) and supply spikes (max climbs).
    max_bus_voltage:
      feature_available: readable
    min_bus_voltage:
      feature_available: readable
    # Electronic expansion valve actual + target position. Useful for
    # observing refrigerant-flow modulation under load and verifying
    # the inverter's superheat-control loop is tracking.
    eev_position:
      feature_available: readable
    eev_target_angle:
      feature_available: readable
    # Compressor on/off state — diagnostic. Useful for cross-checking
    # frequency / current readings (zero-frequency ≠ off in all
    # firmware variants; this flag disambiguates).
    compressor_running:
      feature_available: readable
    # Realtime power draw + cumulative energy. The stock cap probe
    # under-reports availability for these on this hardware revision,
    # so feature_available is forced and the correct linear encodings
    # are pinned. Display precision tuned for typical residential load
    # ranges (kW with 3 decimals, kWh with 2).
    power_realtime_kw:
      capability:
        values:
          none_0:
            feature_available: always
            encoding: power_linear_3
      ha:
        suggested_display_precision: 3
        off_behavior: available
    power_total_kwh:
      capability:
        values:
          none_0:
            feature_available: always
            encoding: power_linear_4
      ha:
        suggested_display_precision: 2
        off_behavior: available
