[pytest]
# asyncio_mode=auto is the pytest-homeassistant-custom-component expected
# setup — sync fixtures can consume async fixtures transparently.
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Unit tests stay fast with mocked HA; integration tests spin up a real
# HA instance via phcc. -m "not integration" skips the slow path.
markers =
    integration: tests that require a real HA event loop via pytest-homeassistant-custom-component
